services:
  - type: web
    name: fitech-laptop-plans
    env: static
    buildCommand: npm install && NODE_ENV=production npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 18.17.0
