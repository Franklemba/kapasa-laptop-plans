services:
  - type: web
    name: fitech-laptop-plans
    env: node
    buildCommand: npm ci && npm run build
    startCommand: npm start
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 18.17.0
